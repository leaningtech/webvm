<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Runner</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/cj3loader.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .upload-area {
            border: 3px dashed rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .upload-area:hover,
        .upload-area.dragover {
            border-color: white;
            background: rgba(255, 255, 255, 0.1);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-label {
            display: inline-block;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .file-label:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        #status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            min-height: 50px;
        }
        
        #java-output {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            min-height: 200px;
            font-family: monospace;
            white-space: pre-wrap;
        }
        
        .ready {
            color: #4ade80;
        }
        
        .loading {
            color: #fbbf24;
        }
        
        .error {
            color: #f87171;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ Java Application Runner</h1>
        <p>Run Java applications (.jar files) directly in your browser using CheerpJ</p>
        
        <div id="status" class="loading">Initializing CheerpJ...</div>
        
        <div class="upload-area" id="dropZone">
            <p style="font-size: 48px; margin-bottom: 10px;">📦</p>
            <p>Drag & drop a .jar file here</p>
            <p style="margin-top: 15px;">or</p>
            <label class="file-label">
                Browse Files
                <input type="file" id="jarFile" accept=".jar">
            </label>
        </div>
        
        <div id="java-output"></div>
    </div>
    
    <script>
        let cheerpjReady = false;
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('java-output');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('jarFile');
        
        // Initialize CheerpJ
        cheerpjInit().then(() => {
            cheerpjReady = true;
            statusDiv.className = 'ready';
            statusDiv.textContent = '✓ CheerpJ Ready - You can now upload .jar files';
            console.log('CheerpJ initialized successfully');
        }).catch(err => {
            statusDiv.className = 'error';
            statusDiv.textContent = '✗ Failed to initialize CheerpJ: ' + err.message;
            console.error('CheerpJ initialization error:', err);
        });
        
        // File input handler
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleJarFile(file);
        });
        
        // Drag and drop handlers
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.jar')) {
                handleJarFile(file);
            } else {
                statusDiv.className = 'error';
                statusDiv.textContent = '✗ Please drop a .jar file';
            }
        });
        
        async function handleJarFile(file) {
            if (!cheerpjReady) {
                statusDiv.className = 'error';
                statusDiv.textContent = '✗ CheerpJ is still loading, please wait...';
                return;
            }
            
            try {
                statusDiv.className = 'loading';
                statusDiv.textContent = '⏳ Loading ' + file.name + '...';
                outputDiv.textContent = '';
                
                // Read the jar file
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                
                // Upload to CheerpJ virtual filesystem
                await cheerpjAddStringFile("/app/" + file.name, uint8Array);
                
                statusDiv.textContent = '▶ Running ' + file.name + '...';
                outputDiv.textContent = 'Starting Java application...\n\n';
                
                // Run the jar file
                await cheerpjRunJar("/app/" + file.name);
                
                statusDiv.className = 'ready';
                statusDiv.textContent = '✓ ' + file.name + ' is running';
                
            } catch (err) {
                statusDiv.className = 'error';
                statusDiv.textContent = '✗ Error running jar: ' + err.message;
                outputDiv.textContent = 'Error: ' + err.message + '\n' + err.stack;
                console.error('Jar execution error:', err);
            }
        }
    </script>
</body>
</html>
