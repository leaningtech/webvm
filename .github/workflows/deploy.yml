name: Deploy WebVM + Dragon OS

on:
  workflow_dispatch:
    inputs:
      DOCKERFILE_PATH:
        type: string
        description: 'Path to the Dockerfile'
        required: true
        default: 'dockerfiles/debian_mini'

      IMAGE_SIZE:
        type: string
        description: 'Image size, 950M max'
        required: true
        default: '750M'

      DEPLOY_TO_GITHUB_PAGES:
        type: boolean
        description: 'Deploy to Github pages'
        required: true
        default: true

      GITHUB_RELEASE:
        type: boolean
        description: 'Upload GitHub release'
        required: true
        default: false

  # Auto-deploy on push to main
  push:
    branches: [ main ]

jobs:

  guard_clause:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    permissions:
      actions: 'write'

    steps:
      - uses: actions/checkout@v4
      
      - name: DOCKERFILE_PATH validation
        shell: bash
        run: |
          DOCKERFILE="${{ github.event.inputs.DOCKERFILE_PATH || 'dockerfiles/debian_mini' }}"
          if [ ! -f "$DOCKERFILE" ]; then
              echo "::error title=Invalid Dockerfile path::No file found at $DOCKERFILE"
              echo "terminate=true" >> $GITHUB_ENV
          fi

      - name: Github Pages config guard clause
        if: ${{ github.event.inputs.DEPLOY_TO_GITHUB_PAGES == 'true' || github.event_name == 'push' }}
        run: |
          set +e
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository_owner }}/$(basename ${{ github.repository }})/pages > pages_response

          if [ "$?" -ne 0 ]; then
            echo "::error title=Potential pages configuration error.::Please make sure you have enabled Github pages for the ${{ github.repository }} repository."
            echo "terminate=true" >> $GITHUB_ENV
          fi
          set -e

          if [[ "$(jq --compact-output --raw-output .build_type pages_response)" != "workflow" ]]; then
              echo "::error title=Pages configuration error.::Please make sure you have correctly picked \"Github Actions\" as the build and deployment source."
              echo "terminate=true" >> $GITHUB_ENV
          fi
          rm pages_response

      - name: Terminate run if error occurred
        run: |
          if [[ $terminate == "true" ]]; then
            gh run cancel ${{ github.run_id }}
            gh run watch ${{ github.run_id }}
          fi

  build:
    needs: guard_clause
    runs-on: ubuntu-latest

    env:
      TAG: "ext2-webvm-base-image"
      IMAGE_SIZE: '${{ github.event.inputs.IMAGE_SIZE || ''750M'' }}'
      DEPLOY_DIR: /webvm_deploy/

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate the image_name
        id: image_name_gen
        run: |
          DOCKERFILE="${{ github.event.inputs.DOCKERFILE_PATH || 'dockerfiles/debian_mini' }}"
          echo "IMAGE_NAME=$(basename $DOCKERFILE)_$(date +%Y%m%d)_${{ github.run_id }}.ext2" >> $GITHUB_ENV

      - run: sudo mkdir -p $DEPLOY_DIR

      - name: Build Docker image
        run: |
          DOCKERFILE="${{ github.event.inputs.DOCKERFILE_PATH || 'dockerfiles/debian_mini' }}"
          docker build . --tag $TAG --file $DOCKERFILE --platform=i386
      
      - name: Run Docker container
        run: |
          docker run --dns 8.8.8.8 --dns 8.8.4.4 -d $TAG
          echo "CONTAINER_ID=$(sudo docker ps -aq)" >> $GITHUB_ENV

      - name: Extract CMD / Entrypoint and args
        shell: bash
        run: |
          cmd=$(sudo docker inspect --format='{{json .Config.Cmd}}' $CONTAINER_ID)
          entrypoint=$(sudo docker inspect --format='{{json .Config.Entrypoint}}' $CONTAINER_ID)
          if [[ $entrypoint != "null" && $cmd != "null" ]]; then
            echo "CMD=$( sudo docker inspect $CONTAINER_ID | jq --compact-output '.[0].Config.Entrypoint' )" >> $GITHUB_ENV
            echo "ARGS=$( sudo docker inspect $CONTAINER_ID | jq --compact-output '.[0].Config.Cmd' )" >> $GITHUB_ENV
          elif [[ $cmd != "null" ]]; then
            echo "CMD=$( sudo docker inspect $CONTAINER_ID | jq --compact-output '.[0].Config.Cmd[:1]' )" >> $GITHUB_ENV
            echo "ARGS=$( sudo docker inspect $CONTAINER_ID | jq --compact-output '.[0].Config.Cmd[1:]' )" >> $GITHUB_ENV
          else
            echo "CMD=$( sudo docker inspect $CONTAINER_ID | jq --compact-output '.[0].Config.Entrypoint[:1]' )" >> $GITHUB_ENV
            echo "ARGS=$( sudo docker inspect $CONTAINER_ID | jq --compact-output '.[0].Config.Entrypoint[1:]' )" >> $GITHUB_ENV
          fi

      - name: Extract env, args and cwd
        shell: bash
        run: |
          echo "ENV=$( sudo docker inspect $CONTAINER_ID | jq --compact-output  '.[0].Config.Env' )" >> $GITHUB_ENV
          echo "CWD=$( sudo docker inspect $CONTAINER_ID | jq --compact-output '.[0].Config.WorkingDir' )" >> $GITHUB_ENV

      - name: Create ext2 image
        run: |
         sudo fallocate -l $IMAGE_SIZE ${IMAGE_NAME}
         sudo mkfs.ext2 -r 0 ${IMAGE_NAME}
         sudo mount -o loop -t ext2 ${IMAGE_NAME} /mnt/

      - name: Export container filesystem to ext2 image
        run: | 
          sudo docker cp -a ${CONTAINER_ID}:/ /mnt/
          sudo umount /mnt/

      - name: Generate image split chunks and .meta file
        run: |
          sudo split ${{ env.IMAGE_NAME }} ${{ env.DEPLOY_DIR }}/${{ env.IMAGE_NAME }}.c -a 6 -b 128k -x --additional-suffix=.txt
          sudo bash -c "stat -c%s ${{ env.IMAGE_NAME }} > ${{ env.DEPLOY_DIR }}/${{ env.IMAGE_NAME }}.meta"

      - name: Adjust config_github_terminal.js
        run: |
          sed -i 's#IMAGE_URL#"${{ env.IMAGE_NAME }}"#g' config_github_terminal.js
          sed -i 's#CMD#${{ env.CMD }}#g' config_github_terminal.js
          sed -i 's#ARGS#${{ env.ARGS }}#g' config_github_terminal.js
          sed -i 's#ENV#${{ env.ENV }}#g' config_github_terminal.js
          sed -i 's#CWD#${{ env.CWD }}#g' config_github_terminal.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build WebVM NPM package
        run: |
          npm install
          WEBVM_MODE=github npm run build

      # ============================================
      # INTEGRATION WITH YOUR OS STARTS HERE
      # ============================================

      - name: Integrate Dragon OS
        run: |
          # Remove alpine version (we don't need it)
          rm -f build/alpine.html
          
          # Copy WebVM build to deploy directory
          sudo mv build/* $DEPLOY_DIR/
          
          # Copy your OS into the deployment
          echo "Integrating Dragon OS..."
          sudo mkdir -p $DEPLOY_DIR/os
          sudo cp -r os/* $DEPLOY_DIR/os/
          
          # Verify OS files copied
          echo "OS files deployed:"
          ls -la $DEPLOY_DIR/os/

      - name: Add SharedArrayBuffer support (COOP/COEP)
        run: |
          cd $DEPLOY_DIR
          
          # Download coi-serviceworker for SharedArrayBuffer support
          sudo wget -q https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js
          
          # Add to WebVM index.html (terminal)
          if [ -f index.html ]; then
            sudo sed -i 's|</head>|<script src="coi-serviceworker.js"></script></head>|' index.html
            echo "Added COOP/COEP to WebVM"
          fi
          
          # Add to OS index.html
          if [ -f os/index.html ]; then
            sudo sed -i 's|</head>|<script src="../coi-serviceworker.js"></script></head>|' os/index.html
            echo "Added COOP/COEP to Dragon OS"
          fi

      - name: Create OS entry point redirect (optional)
        run: |
          # Create a redirect page that sends users to your OS
          cat << 'EOF' | sudo tee $DEPLOY_DIR/os-redirect.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=os/">
            <title>Redirecting to Dragon OS...</title>
          </head>
          <body>
            <p>Redirecting to <a href="os/">Dragon OS</a>...</p>
          </body>
          </html>
          EOF
          
          echo "Created OS redirect page"

      - name: Generate index.list files
        shell: bash
        run: |
          find $DEPLOY_DIR -type d | while read -r dir;
          do
            index_list="$dir/index.list";
            sudo rm -f "$index_list";
            sudo ls "$dir" | sudo tee "$index_list" > /dev/null;
            sudo chmod +rw "$index_list";     
            echo "created $index_list"; 
          done

      - name: Verify deployment structure
        run: |
          echo "=== Deployment Directory Structure ==="
          sudo tree -L 3 $DEPLOY_DIR || sudo find $DEPLOY_DIR -maxdepth 3 -type d
          echo ""
          echo "=== Key Files Check ==="
          echo "WebVM index.html: $([ -f $DEPLOY_DIR/index.html ] && echo '✓ Found' || echo '✗ Missing')"
          echo "OS index.html: $([ -f $DEPLOY_DIR/os/index.html ] && echo '✓ Found' || echo '✗ Missing')"
          echo "COI serviceworker: $([ -f $DEPLOY_DIR/coi-serviceworker.js ] && echo '✓ Found' || echo '✗ Missing')"
          echo "OS VFS.js: $([ -f $DEPLOY_DIR/os/js/vfs.js ] && echo '✓ Found' || echo '✗ Missing')"
          echo "OS bridge: $([ -f $DEPLOY_DIR/os/js/webvm-bridge.js ] && echo '✓ Found' || echo '✗ Missing')"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_DIR }}

      - name: Create GitHub release
        if: ${{ github.event.inputs.GITHUB_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          target_commitish: ${{ github.sha }}
          tag_name: ext2_image_${{ github.run_number }}
          fail_on_unmatched_files: 'true'
          files: |
            ${{ env.IMAGE_NAME }}

  deploy_to_github_pages:
    if: ${{ github.event.inputs.DEPLOY_TO_GITHUB_PAGES == 'true' || github.event_name == 'push' }}
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output deployment URLs
        run: |
          echo "=== Deployment Complete ==="
          echo "WebVM Terminal: ${{ steps.deployment.outputs.page_url }}"
          echo "Dragon OS: ${{ steps.deployment.outputs.page_url }}os/"
          echo "OS Redirect: ${{ steps.deployment.outputs.page_url }}os-redirect.html"